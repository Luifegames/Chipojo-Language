name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build interpreter
        run: make

      - name: Build package manager
        run: make chpm

      - name: Run tests
        run: make test
